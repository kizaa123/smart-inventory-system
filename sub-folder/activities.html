<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="../auth-guard.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../styles.css">
    <title>Manage Activities - Stockmaster</title>
    <style>
        .activities-container {
            padding: 2rem;
            background: #f7f7f7;
            min-height: 100vh;
        }
        .activities-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .invisible-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .invisible-table th, .invisible-table td {
            padding: 15px 20px;
            text-align: left;
            border: none; /* Invisible borders */
        }
        .invisible-table th {
            background-color: #2f0464;
            color: white;
            font-weight: 600;
        }
        .invisible-table tr {
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }
        .invisible-table tr:last-child {
            border-bottom: none;
        }
        .invisible-table tr:hover {
            background-color: #f9f9f9;
        }
        .activity-type-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .badge-sale { background: #e3f2fd; color: #1976d2; }
        .badge-product { background: #fff3e0; color: #f57c00; }
        .badge-staff { background: #f3e5f5; color: #7b1fa2; }
        .badge-category { background: #e1f5fe; color: #0288d1; }
        .badge-supplier { background: #e8f5e9; color: #388e3c; }
        
        .delete-btn {
            color: #d32f2f;
            cursor: pointer;
            font-size: 1.2rem;
            transition: transform 0.2s;
        }
        .delete-btn:hover {
            transform: scale(1.2);
        }
        .back-link {
            text-decoration: none;
            color: #2f0464;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="layout">
        <button class="menu-toggle" id="menuBtn"><i class="fa-solid fa-bars"></i></button>
        <!-- Sidebar remains similar -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header"><i class="fa-solid fa-boxes-stacked"></i><span>Stockmaster</span></div>
            <ul class="nav-list">
                <li class="nav-item"><a href="../index.html"><span><i class="fa-solid fa-gauge"></i></span><span class="nav-text">Dashboard</span></a></li>
                <li class="nav-item"><a href="product.html"><span><i class="fa-solid fa-box"></i></span><span class="nav-text">Products</span></a></li>
                <li class="nav-item"><a href="categories.html"><span><i class="fa-solid fa-list"></i></span><span class="nav-text">Categories</span></a></li>
                <li class="nav-item"><a href="suppliers.html"><span><i class="fa-regular fa-truck"></i></span><span class="nav-text">Suppliers</span></a></li>
                <li class="nav-item"><a href="staff.html"><span><i class="fa-solid fa-users"></i></span><span class="nav-text"> Staff</span></a></li>
                <li class="nav-item"><a href="newSale.html"><span><i class="fa-solid fa-file-invoice-dollar"></i></span><span class="nav-text">New Sale</span></a></li>
            </ul>
        </nav>

        <main class="main-content">
            <a href="../index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
            
            <!-- the navigation logout buttun -->
            <button type="button" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
            
            <div class="activities-header">
                <h1><i class="fa-solid fa-history"></i> Activity History</h1>
            </div>

            <table class="invisible-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Type</th>
                        <th>Activity Description</th>
                        <th>Date & Time</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="activities-table-body">
                    <!-- Activities will be loaded here -->
                </tbody>
            </table>
        </main>
    </div>

    <script src="../api-client.js"></script>
    <script src="activities.js"></script>
</body>
</html>
